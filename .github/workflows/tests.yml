name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: stocky_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            tests/requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r tests/requirements-test.txt

      - name: Lint & format (ruff)
        run: |
          pip install ruff
          ruff check . --select=E9,F63,F7,F82 --show-source
          ruff format --check .

      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy src/ --ignore-missing-imports

      - name: Security scan (ruff)
        run: ruff check . --select=S --show-source

      - name: Run test suite with coverage
        run: python scripts/test_runner.py --category all --coverage --verbose
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stocky_test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella-python-${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage report
        run: |
          pip install coverage
          coverage report --show-missing

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 30

  docker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t stocky-backend:test .

      - name: Test Docker image
        run: |
          docker run -d --name stocky-test -p 8000:8000 stocky-backend:test
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health; then
              echo "Container healthy after ${i}s"
              break
            fi
            sleep 1
          done
          # Verify the API is responding
          curl -sf -o /dev/null -w "Status: %{http_code}\n" http://localhost:8000/api/v1/health

      - name: Cleanup
        if: always()
        run: docker rm -f stocky-test 2>/dev/null || true
        
        # Stop the container
        docker stop stocky-test
        docker rm stocky-test

  performance-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: |
          pyproject.toml
          tests/requirements-test.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install -r tests/requirements-test.txt
        pip install locust

    - name: Run performance tests
      run: |
        # Run slow tests using test runner
        python scripts/test_runner.py --category slow --verbose

    - name: Performance regression check
      run: |
        # Run benchmark tests if they exist
        pytest tests/ -k "benchmark" --benchmark-only --benchmark-json=benchmark.json || echo "No benchmark tests found"

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-results
        path: benchmark.json
        retention-days: 30

  merge-coverage:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
    - name: Merge coverage artifacts
      uses: actions/upload-artifact/merge@v4
      with:
        name: all-coverage-reports
        pattern: coverage-report-python-*
        delete-merged: true
        retention-days: 30
